<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../../library/bootstrap-5.3.2-dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../../../library/jquery-ui-1.13.2/jquery-ui.min.css">
    <!-- <link rel="stylesheet" href="../../../library/lib-common/css/base/reset.css"> -->
    <link rel="stylesheet" href="../../../library/fontawesome/css/fontawesome.min.css">
    <link rel="stylesheet" href="../../../library/fontawesome/css/brands.css">
    <link rel="stylesheet" href="../../../library/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="../../../library/lib-common/lib-common.css">
    <link rel="stylesheet" href="../../src-common/src-common.css">
    <title>Booking</title>
</head>

<body class="page-web">
    <header>
        <a href="#" class="icon icon-menu">
            <i class="fa-solid fa-bars"></i>
        </a>
        <a href="#" class="icon">
            <i class="fa-solid fa-magnifying-glass"></i>
        </a>
    </header>
    <div class="wrapper">
        <nav>
            <ul>
                <li>
                    <a href="./main_oneWAY.html">One Way</a>
                </li>
                <li class="active">
                    <a href="./main_oneWAY.html">Round Trip</a>
                </li>
                <li>
                    <a href="./main_oneWAY.html">Multicity</a>
                </li>
            </ul>
        </nav>

        <main>
            <div class="input-box box-L">
                <div class="input" data-toggle="modal" data-target="#locateModal">
                    <span class="s-title">
                        from
                    </span>
                    <p class="txt location">
                        Sydney(SYD)
                    </p>
                </div>
                <a href="#" class="icon">
                    <i class="fa-solid fa-plane-departure"></i>
                </a>
                <div class="input box-R">
                    <span class="s-title">
                        to
                    </span>
                    <p class="txt location">
                        Taipei(TPE)
                    </p>
                </div>
            </div>
            <div class="input-box box-m">
                <div class="input">
                    <span class="s-title">
                        depart
                    </span>
                    <p class="txt date">
                        Dec 23, 2024
                    </p>
                </div>
                <div class="input box-R">
                    <span class="s-title">
                        return
                    </span>
                    <p class="txt date">
                        Dec 23, 2024
                    </p>
                </div>
            </div>
            <div class="input-box input-flex">
                <div class="input">
                    <span class="s-title">
                        passenger
                    </span>
                    <div class="passenger-content">
                        <div class="person">
                            <a href="#" class="icon">
                                <i class="fa-solid fa-person"></i>
                            </a>
                            <div class="number">1</div>
                        </div>
                        <div class="person">
                            <a href="#" class="icon">
                                <i class="fa-solid fa-child"></i>
                            </a>
                            <div class="number">0</div>
                        </div>
                        <div class="person">
                            <a href="#" class="icon">
                                <i class="fa-solid fa-baby"></i>
                            </a>
                            <div class="number">0</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="input-box input-flex">
                <div class="input">
                    <span class="s-title">
                        class
                    </span>
                    <p class="txt">
                        Business
                    </p>
                </div>
            </div>
            <a href="#" class="btn-s">
                nonstop flights only
            </a>
            <button>
                Search
            </button>
        </main>
        <footer>
            <ul>
                <li>
                    <a href="#" class="icon">
                        <i class="fa-solid fa-house"></i>
                    </a>
                </li>
                <li>
                    <a href="#" class="icon">
                        <i class="fa-solid fa-plane-up"></i>
                    </a>
                </li>
                <li>
                    <a href="#" class="icon">
                        <i class="fa-solid fa-compass"></i>
                    </a>
                </li>
                <li>
                    <a href="#" class="icon">
                        <i class="fa-solid fa-user"></i>
                    </a>
                </li>
            </ul>

        </footer>
        <!-- modal -->
        <div class="modal modal-bottom fade show" id="locateModal" tabindex="-1" aria-labelledby="locateModalTitle"
            aria-modal="true" role="dialog">
            <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
                <div class="modal-content">
                    <div class="modal-header">
                        <h1 class="modal-title fs-5" id="locateModalTitle">Select Dates</h1>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div class="search-Btn">
                            <input type="text" placeholder="Search">
                            <a href="#" class="icon">
                                <i class="fa-solid fa-magnifying-glass"></i>
                            </a>
                        </div>
                        <div class="container-fluid bd-example-row">
                            <div class="row">
                                <div class="s-title">Asia</div>
                                <div class="col-md-4">
                                    <div class="locate">Tokyo</div>
                                    <p class="s-locate">HKD</p>
                                </div>
                                <div class="col-md-4">
                                    <div class="locate">Seoul</div>
                                    <p class="s-locate">GMP</p>
                                </div>
                            </div>

                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-primary">Done</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- <script src="../../../library/bootstrap-5.3.2-dist/js/bootstrap.min.js"></script> -->
    <!-- <script src="../../../library/jquery-ui-1.13.2/jquery-ui.min.js"></script> -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>

</html>
